<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="page-sub">
  <header class="site-header">
    <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode" title="Toggle dark/light mode">
      <span class="theme-toggle-icon" aria-hidden="true"></span>
    </button>
    <nav class="nav" aria-label="Primary">
      <a href="index.html" class="nav-link">Home</a>
      <a href="research.html" class="nav-link">Research</a>
      <a href="impact.html" class="nav-link">Impact</a>
      <a href="experience.html" class="nav-link">Experience</a>
      <a href="service.html" class="nav-link">Professional service</a>
      <a href="media.html" class="nav-link">Media mentions</a>
      <a href="background.html" class="nav-link">Background</a>
      <a href="contact.html" class="nav-link nav-link--current" aria-current="page">Contact</a>
    </nav>
  </header>

  <main>
    <section class="section page-section contact">
      <h1 class="page-title">Contact</h1>
      <p class="contact-intro">Email with topic, timeline, and (for reviews) venue.</p>
      <div class="contact-links">
        <a href="mailto:danielbenniah@berkeley.edu" class="contact-link">danielbenniah@berkeley.edu</a>
        <a href="https://linkedin.com/in/danielbenniah" target="_blank" rel="noopener" class="contact-link">LinkedIn</a>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>© <span id="year"></span> Daniel Benniah John</p>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    (function() {
      var toggle = document.getElementById('theme-toggle');
      var stored = localStorage.getItem('theme');
      if (stored === 'light') document.documentElement.classList.add('theme-light');
      toggle.addEventListener('click', function() {
        document.documentElement.classList.toggle('theme-light');
        localStorage.setItem('theme', document.documentElement.classList.contains('theme-light') ? 'light' : 'dark');
      });
    })();
  </script>
</body>
</html>
